<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Semana Regional de la Extensión UNaM</title>
  <meta name="description" content="Recorrido digital por las tres sedes de la Universidad Nacional de Misiones durante la Semana Regional de la Extensión." />

  <!-- Roboto es la tipografía institucional única (Manual de Identidad UNaM, sección 06).
       Si no hay conexión a internet, cae al stack de system fonts definido en styles.css. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <div class="marca-chip" aria-hidden="false">
    <img class="marca-chip-logo" src="assets/logos/unam-badge.svg" alt="" />
    <span class="marca-chip-texto">UNaM extensión</span>
  </div>

  <header class="encabezado-evento">
    <p class="encabezado-evento-titulo"></p>
    <p class="encabezado-evento-bajada"></p>
    <p class="encabezado-evento-fechas"></p>
  </header>

  <main id="carrusel" class="carrusel" aria-label="Recorrido por las sedes de la Semana Regional de la Extensión">
    <!-- app.js construye acá una <section class="sede"> por cada sede visible -->
  </main>

  <nav class="ruta" aria-label="Navegación entre sedes">
    <button class="ruta-flecha ruta-flecha--anterior" aria-label="Sede anterior">‹</button>
    <ol class="ruta-nodos"><!-- app.js completa los nodos --></ol>
    <button class="ruta-flecha ruta-flecha--siguiente" aria-label="Sede siguiente">›</button>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
